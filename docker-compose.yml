services:
  mongodb:
    image: mongo:latest
    container_name: ems-mongodb
    ports:
      - "27018:27017"
    volumes:
      - ems-db-data:/data/db

  backend:
    build: ./server
    container_name: ems-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/EMS
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb

  frontend:
    build: ./client
    container_name: ems-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  ems-db-data:
