services:
  mongodb:
    image: mongo:latest

    container_name: ems-mongodb
    ports:
      - "27018:27017"
    volumes:
      - ems-db-data:/data/db

    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ems-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ems_db
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ems-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: always

volumes:
  ems-db-data:

